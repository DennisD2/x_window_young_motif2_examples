name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: make
      run: pwd; echo "--.--"; ls; echo "--..--"; ls ..; echo "--Makefile--";cat Makefile; echo "----"; make all

